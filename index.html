<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- İkonlar -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%234CAF50' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white'%3E🏢%3C/text%3E%3C/svg%3E">
    
    <title>Gaziosmanpaşa Analiz</title>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; 
            padding: 15px; 
            background: #f0f2f5; 
            touch-action: manipulation;
        }
        
        .container { 
            max-width: 100%; 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        h2 { 
            margin: 0 0 20px 0; 
            color: #1a1a1a; 
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .install-btn {
            display: none;
            width: 100%;
            padding: 15px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            cursor: pointer;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: block;
            padding: 25px 20px;
            background: #e3f2fd;
            border: 2px dashed #2196F3;
            border-radius: 16px;
            text-align: center;
            color: #1976D2;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .file-input-label:active {
            background: #bbdefb;
            transform: scale(0.98);
        }
        
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            transition: all 0.2s;
        }
        
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }
        
        button:disabled {
            background: #ccc;
            box-shadow: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
            color: #666;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .result {
            display: none;
            margin-top: 20px;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .row:last-child { border-bottom: none; }
        
        .label { color: #666; font-size: 15px; }
        .value { color: #333; font-weight: 600; font-size: 16px; }
        
        .total-mesken {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border: 2px solid #4CAF50;
        }
        
        .total-isyeri {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border: 2px solid #FF9800;
        }
        
        .grand-total {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
        }
        
        .grand-total .label,
        .grand-total .value { color: white; }
        
        .big-number { font-size: 28px; font-weight: 700; }
        
        .error {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 16px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .file-name {
            text-align: center;
            color: #4CAF50;
            font-weight: 500;
            margin: 10px 0;
            font-size: 14px;
            word-break: break-all;
        }
        
        .standalone-msg {
            display: none;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏢 Gaziosmanpaşa Analiz</h2>
        
        <div class="standalone-msg" id="standaloneMsg">
            ✅ Uygulama modunda çalışıyor
        </div>
        
        <button class="install-btn" id="installBtn" onclick="installPWA()">
            📲 Ana Ekrana Ekle
        </button>
        
        <div class="file-input-wrapper">
            <input type="file" id="pdfFile" accept=".pdf,application/pdf" onchange="fileSelected()">
            <label for="pdfFile" class="file-input-label" id="fileLabel">
                📄 PDF Dosyası Seç<br>
                <small style="color: #888; font-weight: normal;">Dosyaya dokunun</small>
            </label>
        </div>
        
        <div class="file-name" id="fileName"></div>
        
        <button onclick="analyzePDF()" id="analyzeBtn" disabled>
            🔍 Analiz Et
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>PDF okunuyor...</div>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <div class="card">
                <div class="row">
                    <span class="label">İkamet Amaçlı</span>
                    <span class="value" id="val1">-</span>
                </div>
                <div class="row">
                    <span class="label">İkamet Harici</span>
                    <span class="value" id="val2">-</span>
                </div>
                <div class="row">
                    <span class="label">Kapıcı Dairesi</span>
                    <span class="value" id="val3">-</span>
                </div>
                <div class="row">
                    <span class="label">Mesken</span>
                    <span class="value" id="val4">-</span>
                </div>
            </div>
            
            <div class="card total-mesken">
                <div class="row">
                    <span class="label">TOPLAM MESKEN</span>
                    <span class="value big-number" id="totalMesken">-</span>
                </div>
            </div>
            
            <div class="card total-isyeri">
                <div class="row">
                    <span class="label">TOPLAM İŞYERİ</span>
                    <span class="value big-number" id="totalIsyeri">-</span>
                </div>
            </div>
            
            <div class="card grand-total">
                <div class="row">
                    <span class="label">GENEL TOPLAM</span>
                    <span class="value big-number" id="grandTotal">-</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // PWA Install
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });
        
        function installPWA() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('Kullanıcı yükledi');
                }
                deferredPrompt = null;
                document.getElementById('installBtn').style.display = 'none';
            });
        }
        
        // Standalone kontrol
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            document.getElementById('standaloneMsg').style.display = 'block';
        }
        
        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }
        
        // PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let selectedFile = null;
        
        function fileSelected() {
            const input = document.getElementById('pdfFile');
            const label = document.getElementById('fileLabel');
            const fileName = document.getElementById('fileName');
            const btn = document.getElementById('analyzeBtn');
            
            if (input.files.length > 0) {
                selectedFile = input.files[0];
                fileName.textContent = "📎 " + selectedFile.name;
                label.innerHTML = "✅ PDF Seçildi<br><small style='color: #888;'>Değiştirmek için dokunun</small>";
                btn.disabled = false;
                document.getElementById('result').style.display = 'none';
                document.getElementById('error').style.display = 'none';
            }
        }
        
        async function analyzePDF() {
            if (!selectedFile) return;
            
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            const btn = document.getElementById('analyzeBtn');
            
            loading.style.display = 'block';
            error.style.display = 'none';
            result.style.display = 'none';
            btn.disabled = true;
            
            if (navigator.vibrate) navigator.vibrate(50);
            
            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                
                let fullText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n';
                }
                
                const patterns = {
                    ikamet_amacli: /İkamet\s*Amaçlı\s*(\d[\d\s\.]*)/i,
                    ikamet_harici: /İkamet\s*Harici\s*(\d[\d\s\.]*)/i,
                    kapici: /Kapıcı\s*Dairesi\s*(\d[\d\s\.]*)/i,
                    mesken: /Mesken\s+(\d[\d\s\.]*)(?=\s|$)/m,
                    toplam: /GAZİOSMANPAŞA\s*İlçesi\s*Toplam\s*(\d[\d\s\.]*)/i
                };
                
                const values = {};
                for (const [key, pattern] of Object.entries(patterns)) {
                    const match = fullText.match(pattern);
                    if (!match) throw new Error(`${key} bulunamadı`);
                    values[key] = parseInt(match[1].replace(/[\s\.]/g, ''));
                }
                
                const meskenToplam = values.ikamet_amacli + values.ikamet_harici + values.kapici + values.mesken;
                const isyeri = values.toplam - meskenToplam;
                
                document.getElementById('val1').textContent = values.ikamet_amacli.toLocaleString('tr-TR');
                document.getElementById('val2').textContent = values.ikamet_harici.toLocaleString('tr-TR');
                document.getElementById('val3').textContent = values.kapici.toLocaleString('tr-TR');
                document.getElementById('val4').textContent = values.mesken.toLocaleString('tr-TR');
                document.getElementById('totalMesken').textContent = meskenToplam.toLocaleString('tr-TR');
                document.getElementById('totalIsyeri').textContent = isyeri.toLocaleString('tr-TR');
                document.getElementById('grandTotal').textContent = values.toplam.toLocaleString('tr-TR');
                
                result.style.display = 'block';
                if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
                
            } catch (err) {
                error.textContent = '❌ ' + err.message;
                error.style.display = 'block';
                if (navigator.vibrate) navigator.vibrate(200);
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
